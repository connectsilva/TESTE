<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Capoeira Control Pro v2.3</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00c853;
            --primary-dark: #0f6b63;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #252525;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --danger: #ff5252;
            --warning: #ffab40;
            --info: #2196f3;
            --radius: 12px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { 
            background: radial-gradient(circle at top, var(--primary-dark), var(--bg-dark));
            color: var(--text-main); margin: 0; background-attachment: fixed; min-height: 100vh; padding-bottom: 50px;
        }

        .container { max-width: 800px; margin: auto; padding: 20px; display: none; }

        #loginBox { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; }
        .login-card { background: var(--card-bg); padding: 30px; border-radius: var(--radius); border: 1px solid var(--primary); width: 100%; max-width: 350px; text-align: center; }
        
        .login-header-info { margin-bottom: 25px; }
        .login-logo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); margin-bottom: 10px; }
        .login-academia-nome { font-size: 20px; font-weight: bold; color: var(--primary); display: block; text-transform: uppercase; }
        .login-professor-nome { font-size: 14px; color: var(--text-main); opacity: 0.8; }

        .remember-me { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; color: var(--text-dim); cursor: pointer; justify-content: center; }
        .remember-me input { width: auto; margin: 0; cursor: pointer; }

        .header-academia { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); }
        .logo-academia { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: #222; border: 1px solid var(--primary); }
        .info-academia h1 { margin: 0; font-size: 18px; color: var(--primary); text-transform: uppercase; }
        .info-academia .professor { font-size: 13px; color: #fff; font-weight: bold; margin-top: 3px; }

        .header-nav { display: flex; justify-content: space-between; align-items:center; margin-bottom: 20px; }
        .settings-btn { font-size: 22px; cursor: pointer; background: rgba(255,255,255,0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .box { background: var(--card-bg); padding: 15px; border-radius: var(--radius); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .box span { font-size: 24px; font-weight: bold; color: var(--primary); display: block; }

        .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .form-box { max-height: 0; overflow: hidden; transition: 0.4s; }
        .form-box.ativo { max-height: 1500px; padding-top: 20px; }
        
        .photo-upload { width: 80px; height: 80px; background: var(--input-bg); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px dashed var(--primary); overflow: hidden; position: relative; }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }

        label { font-size: 11px; color: var(--primary); font-weight: bold; display: block; margin-bottom: 5px; margin-top: 10px; }
        input, select, textarea { padding: 12px; border: 2px solid transparent; border-radius: 8px; width: 100%; background: var(--input-bg); color: #fff; font-size: 14px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn { background: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-info { background: var(--info); color: #fff; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; overflow-x: auto; }
        .tabs button { flex: 1; background: transparent; color: var(--text-dim); white-space: nowrap; font-size: 11px; }
        .tabs button.abaAtiva { background: var(--card-bg); color: var(--primary); }

        .aluno { background: #1e1e1e; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .aluno-header { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .aluno-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); }
        .parcelas { display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .parcelas.ativo { display: block; }
        .parcela { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 8px; }

        #configMenu { display:none; position:fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 15px; overflow-y: auto; }
        .config-container { max-width: 500px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: var(--radius); border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <div class="login-header-info">
            <img id="loginLogoImg" class="login-logo" src="https://cdn-icons-png.flaticon.com/512/3233/3233514.png">
            <span id="loginNomeAcad" class="login-academia-nome">Aguarde...</span>
            <div id="loginNomeProf" class="login-professor-nome">Carregando dados</div>
        </div>
        <input id="lUser" placeholder="E-mail">
        <input id="lPass" type="password" placeholder="Senha" style="margin-top:10px">
        <label class="remember-me">
            <input type="checkbox" id="chkLembrar"> Lembrar meu e-mail
        </label>
        <button id="btnEntrar" class="btn" style="width:100%; margin-top:20px" onclick="entrar()">ENTRAR</button>
        <button class="btn-info" style="width:100%; margin-top:10px; background: #333" onclick="cadastrar()">CRIAR CONTA</button>
    </div>
</div>

<div id="configMenu">
    <div class="config-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color:var(--primary); margin:0;">⚙️ Configurações</h2>
            <button onclick="toggleSettings()" style="background:none; color:var(--danger); font-size: 28px;">×</button>
        </div>
        <div class="tabs">
            <button id="btnSetGeral" class="abaAtiva" onclick="mudarTabConfig('Geral')">GERAL</button>
            <button id="btnSetMsg" onclick="mudarTabConfig('Msg')">COBRANÇA</button>
            <button id="btnSetDados" onclick="mudarTabConfig('Dados')">CONTA</button>
        </div>
        <div id="setGeral">
            <div class="photo-upload" onclick="$('cfgFileLogo').click()">
                <img id="cfgLogoPreview" src="">
            </div>
            <input type="file" id="cfgFileLogo" hidden onchange="previewImg(this, 'cfgLogoPreview')">
            <label>Nome da Academia</label><input id="cfgNome">
            <label>Professor Responsável</label><input id="cfgProf">
            <label>Chave PIX</label><input id="cfgPix">
            <button id="btnSalvarConfig" class="btn" style="width:100%; margin-top:25px" onclick="salvarConfig()">💾 SALVAR NA NUVEM</button>
            
            <input type="file" id="fileBackup" accept=".json" style="display:none" onchange="processarArquivoBackup(this)">
            <button class="btn-info" style="width:100%; margin-top:10px; background: #444" onclick="$('fileBackup').click()">📥 RESTAURAR DO DISPOSITIVO</button>
        </div>
        <div id="setMsg" style="display:none">
            <label>Modelo de Mensagem</label>
            <textarea id="cfgMsg" rows="10"></textarea>
            <button class="btn" style="width:100%; margin-top:25px" onclick="salvarConfig()">💾 SALVAR MENSAGEM</button>
        </div>
        <div id="setDados" style="display:none">
            <button class="btn-danger" style="width:100%" onclick="logout()">ENCERRAR SESSÃO</button>
        </div>
    </div>
</div>

<div class="container" id="mainApp">
    <div class="header-academia">
        <img id="logoTopo" class="logo-academia" src="">
        <div class="info-academia">
            <h1 id="nomeTopo">Academia</h1>
            <div id="profTopo" class="professor">Professor</div>
        </div>
    </div>
    <div class="header-nav">
        <h2 style="margin:0">Gestão</h2>
        <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
    </div>
    <div class="dashboard">
        <div class="box"><small>ALUNOS</small><span id="dAlunos">0</span></div>
        <div class="box"><small>EM ATRASO</small><span id="dAtraso" style="color:var(--danger)">0</span></div>
    </div>

    <div class="card">
        <h3 onclick="toggleForm()" style="cursor:pointer; margin:0; display:flex; justify-content:space-between">
            <span>➕ Novo Aluno</span>
            <span style="font-size:12px; color:var(--primary)">ABRIR</span>
        </h3>
        <div id="form" class="form-box">
            <div class="photo-upload" onclick="$('alunoFileFoto').click()"><img id="alunoFotoPreview" src="https://via.placeholder.com/80"></div>
            <input type="file" id="alunoFileFoto" hidden onchange="previewImg(this, 'alunoFotoPreview')">
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>Nome</label><input id="nome"></div>
                <div style="flex:1"><label>Apelido</label><input id="apelido"></div>
            </div>
            <label>WhatsApp</label><input id="tel" type="tel">
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>Valor</label><input id="valor" type="number"></div>
                <div style="flex:1"><label>1º Vencimento</label><input id="venc" type="date"></div>
            </div>
            <label>Parcelas</label><input id="meses" type="number" value="12">
            <button class="btn" style="width:100%; margin-top:15px" onclick="salvarAluno()">CADASTRAR</button>
        </div>
    </div>

    <input id="inputBusca" placeholder="🔍 Buscar aluno por nome ou apelido..." oninput="render()" style="margin-bottom:15px">

    <div class="card" style="padding:10px">
        <div class="tabs">
            <button id="tAtr" class="abaAtiva" onclick="trocarAba('atrasado')">🔴 ATRASADOS</button>
            <button id="tPen" onclick="trocarAba('pendente')">🟡 PRÓXIMOS</button>
            <button id="tDia" onclick="trocarAba('pago')">🟢 EM DIA</button>
        </div>
        <div id="lista"></div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);

    const firebaseConfig = {
        apiKey: "AIzaSyBaR3l4VXYRIHyvcyqMco6Sy4_-eYGpR8g",
        authDomain: "teste02-ce0d2.firebaseapp.com",
        projectId: "teste02-ce0d2",
        storageBucket: "teste02-ce0d2.firebasestorage.app",
        messagingSenderId: "389717337129",
        appId: "1:389717337129:web:fdc718e47ff6ea73f96838"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let alunos = [];
    let config = {
        nome: "Sua Academia", prof: "Professor", pix: "",
        logo: "https://cdn-icons-png.flaticon.com/512/3233/3233514.png",
        msg: "*COBRANÇA* 🥋\n\nOlá, *[nome]*!"
    };

    window.onload = () => {
        auth.signOut();
        const savedConfig = JSON.parse(localStorage.getItem('capoeira_config'));
        if(savedConfig) { config = savedConfig; aplicarIdentidadeVisual(config); }
        const savedEmail = localStorage.getItem('capoeira_email');
        if(savedEmail) { $("lUser").value = savedEmail; $("chkLembrar").checked = true; }
    };

    async function entrar() {
        const u = $("lUser").value, p = $("lPass").value, lembrar = $("chkLembrar").checked;
        if(!u || !p) return alert("Preencha tudo!");
        if(lembrar) localStorage.setItem('capoeira_email', u);
        else localStorage.removeItem('capoeira_email');
        await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        auth.signInWithEmailAndPassword(u, p).catch(e => alert("Erro: " + e.message));
    }

    auth.onAuthStateChanged(user => {
        if (user) { $("loginBox").style.display = "none"; $("mainApp").style.display = "block"; carregarDados(); }
        else { $("loginBox").style.display = "flex"; $("mainApp").style.display = "none"; }
    });

    async function carregarDados() {
        const doc = await db.collection('users').doc(auth.currentUser.uid).get();
        if(doc.exists) {
            const data = doc.data();
            alunos = data.alunos || [];
            if(data.config) {
                config = data.config;
                localStorage.setItem('capoeira_config', JSON.stringify(config));
                aplicarIdentidadeVisual(config);
            }
            render();
        }
    }

    function aplicarIdentidadeVisual(dados) {
        if(!dados) return;
        $("loginLogoImg").src = dados.logo;
        $("loginNomeAcad").innerText = dados.nome;
        $("loginNomeProf").innerText = "Prof: " + dados.prof;
        $("logoTopo").src = dados.logo;
        $("nomeTopo").innerText = dados.nome;
        $("profTopo").innerText = "Professor: " + dados.prof;
        $("cfgLogoPreview").src = dados.logo;
        $("cfgNome").value = dados.nome;
        $("cfgProf").value = dados.prof;
        $("cfgPix").value = dados.pix;
        $("cfgMsg").value = dados.msg;
    }

    // RESTAURAÇÃO CORRIGIDA (SEM RELOAD)
    function processarArquivoBackup(input) {
        const arquivo = input.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = async function(e) {
            try {
                const dados = JSON.parse(e.target.result);
                if (dados.alunos) {
                    if (confirm("Deseja substituir todos os dados atuais?")) {
                        alunos = dados.alunos;
                        if (dados.config) config = dados.config;
                        
                        // Espera salvar no Firebase antes de atualizar a tela
                        await sincronizar();
                        
                        // Atualiza as cores e textos sem dar F5
                        aplicarIdentidadeVisual(config);
                        render();
                        
                        alert("Backup carregado com sucesso!");
                        toggleSettings(); // Fecha o menu
                    }
                } else {
                    alert("Arquivo inválido.");
                }
            } catch (erro) {
                alert("Erro ao ler o arquivo.");
            }
        };
        leitor.readAsText(arquivo);
        input.value = ""; 
    }

    async function sincronizar() {
        if(!auth.currentUser) return;
        await db.collection('users').doc(auth.currentUser.uid).set({ config, alunos });
        localStorage.setItem('capoeira_config', JSON.stringify(config));
        render();
    }

    function salvarConfig() {
        config.nome = $("cfgNome").value; 
        config.prof = $("cfgProf").value;
        config.pix = $("cfgPix").value; 
        config.msg = $("cfgMsg").value;
        config.logo = $("cfgLogoPreview").src;
        sincronizar().then(() => toggleSettings());
    }

    function salvarAluno() {
        const n = $("nome").value, ap = $("apelido").value, v = parseFloat($("valor").value), d = $("venc").value;
        if(!n || isNaN(v) || !d) return alert("Erro nos dados!");
        const parcelas = [];
        let [ano, mes, dia] = d.split('-');
        for(let i=0; i<parseInt($("meses").value); i++) {
            let dt = new Date(ano, mes-1, dia);
            dt.setMonth(dt.getMonth() + i);
            parcelas.push({data: dt.toLocaleDateString('pt-BR'), pago: false});
        }
        alunos.push({nome: n, apelido: ap, tel: $("tel").value, valor: v, foto: $("alunoFotoPreview").src, parcelas, open: false});
        $("nome").value = ""; $("apelido").value = ""; $("tel").value = ""; 
        sincronizar();
        toggleForm();
    }

    let abaAtual = "atrasado";
    function trocarAba(a) { 
        abaAtual = a; 
        $("tAtr").className = a === 'atrasado' ? 'abaAtiva' : '';
        $("tPen").className = a === 'pendente' ? 'abaAtiva' : '';
        $("tDia").className = a === 'pago' ? 'abaAtiva' : '';
        render(); 
    }

    function render() {
        const lista = $("lista"); lista.innerHTML = "";
        const busca = $("inputBusca").value.toLowerCase();
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const parseData = d => { const [dia, mes, ano] = d.split('/'); return new Date(ano, mes-1, dia); };
        let nAtraso = 0;

        alunos.forEach((a, i) => {
            const matchesBusca = a.nome.toLowerCase().includes(busca) || (a.apelido && a.apelido.toLowerCase().includes(busca));
            if(!matchesBusca) return;
            const atrasadas = a.parcelas.filter(p => !p.pago && parseData(p.data) < hoje);
            const pendentes = a.parcelas.filter(p => !p.pago && parseData(p.data) >= hoje);
            const pagas = a.parcelas.filter(p => p.pago);
            nAtraso += atrasadas.length;
            let exibir = (abaAtual === 'atrasado') ? atrasadas : (abaAtual === 'pendente' ? pendentes : pagas);
            if(exibir.length > 0 || a.open) {
                lista.innerHTML += `
                <div class="aluno" style="border-left-color: ${atrasadas.length ? 'var(--danger)' : 'var(--primary)'}">
                    <div class="aluno-header" onclick="toggleAluno(${i})">
                        <img class="aluno-img" src="${a.foto}">
                        <div style="flex:1"><b>${a.nome}</b> ${a.apelido ? `<br><small style="color:var(--primary)">(${a.apelido})</small>` : ''}</div>
                        <span style="background:${atrasadas.length?'var(--danger)':'#333'}; padding:3px 10px; border-radius:12px; font-size:11px">${exibir.length}</span>
                    </div>
                    <div class="parcelas ${a.open?'ativo':''}">
                        ${exibir.map(p => `
                            <div class="parcela">
                                <div><b>R$ ${a.valor.toFixed(2)}</b><br><small>${p.data}</small></div>
                                <div style="display:flex;gap:5px">
                                    <button class="btn" style="background:${p.pago?'#444':'var(--primary)'}" onclick="baixar(${i}, '${p.data}')">${p.pago?'↩':'✔'}</button>
                                    <button class="btn-info" style="background:var(--warning); padding:5px" onclick="cobrar(${i}, '${p.data}')">📱</button>
                                    <button class="btn-danger" style="padding:5px" onclick="remover(${i})">🗑</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
        });
        $("dAlunos").innerText = alunos.length;
        $("dAtraso").innerText = nAtraso;
    }

    function mudarTabConfig(tab) {
        ['Geral', 'Msg', 'Dados'].forEach(t => {
            $(`set${t}`).style.display = t === tab ? 'block' : 'none';
            $(`btnSet${t}`).className = t === tab ? 'abaAtiva' : '';
        });
    }

    function baixar(ai, data) {
        const p = alunos[ai].parcelas.find(x => x.data === data);
        if(p) { p.pago = !p.pago; sincronizar(); }
    }

    function cobrar(idx, data) {
        const a = alunos[idx];
        let t = config.msg.replace("[nome]", a.apelido || a.nome).replace("[data]", data).replace("[valor]", a.valor.toFixed(2)).replace("[pix]", config.pix);
        window.open(`https://wa.me/${a.tel.replace(/\D/g,"")}?text=${encodeURIComponent(t)}`);
    }

    function toggleSettings() { $("configMenu").style.display = $("configMenu").style.display==="block"?"none":"block"; }
    function toggleForm() { $("form").classList.toggle("ativo"); }
    function toggleAluno(i) { alunos[i].open = !alunos[i].open; render(); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function remover(i) { if(confirm("Excluir aluno?")) { alunos.splice(i,1); sincronizar(); } }
    function previewImg(input, imgId) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { $(imgId).src = e.target.result; }; reader.readAsDataURL(input.files[0]); } }
    function cadastrar() { const u = $("lUser").value, p = $("lPass").value; auth.createUserWithEmailAndPassword(u, p).then(res => db.collection('users').doc(res.user.uid).set({ config, alunos: [] })).catch(e => alert(e.message)); }
</script>
</body>
</html>
